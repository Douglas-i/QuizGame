<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semillas I — Examen en vivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #EFE4C8;
    --paper-dark: #E2D2A6;
    --paper-shadow: #C9B586;
    --ink: #24331C;
    --ink-soft: #56624A;
    --sprout: #4F7942;
    --sprout-dark: #375A2E;
    --soil: #7A5230;
    --brick: #A2402C;
    --gold: #C4881F;
    --line: rgba(36,51,28,0.28);
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 10%, rgba(255,255,255,0.35), transparent 40%),
      var(--paper);
    background-attachment: fixed;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  /* subtle paper grain */
  body::before{
    content:"";
    position:fixed; inset:0;
    pointer-events:none;
    opacity:0.05;
    background-image: radial-gradient(circle, var(--ink) 1px, transparent 1px);
    background-size: 4px 4px;
  }

  .field{ max-width:1180px; margin:0 auto; padding: 28px 20px 60px; }

  header.top{
    display:flex; align-items:flex-end; justify-content:space-between;
    gap: 20px; margin-bottom: 26px; flex-wrap: wrap;
    border-bottom: 3px double var(--ink);
    padding-bottom: 14px;
  }
  .brand{ display:flex; align-items:center; gap:14px; }
  .brand svg{ width:46px; height:46px; flex-shrink:0; }
  .brand h1{
    font-family:'Fraunces', serif; font-weight:700; font-size: 2rem;
    margin:0; letter-spacing:0.2px; line-height:1.05;
  }
  .brand p{ margin:2px 0 0; font-family:'Space Mono', monospace; font-size:0.72rem;
    letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-soft); }

  .catalog-tag{
    font-family:'Space Mono', monospace; font-size:0.72rem; text-transform:uppercase;
    letter-spacing:0.1em; color:var(--ink-soft); text-align:right; line-height:1.6;
  }
  .catalog-tag b{ color:var(--ink); }

  .layout{ display:grid; grid-template-columns: 1fr 300px; gap: 26px; align-items:start; }
  @media (max-width: 860px){ .layout{ grid-template-columns: 1fr; } }

  /* ---------- SEED PACKET CARD ---------- */
  .packet{
    position:relative;
    background: var(--paper-dark);
    border-radius: 6px;
    padding: 34px 32px 30px;
    box-shadow: 0 2px 0 var(--paper-shadow), 0 18px 34px -20px rgba(36,51,28,0.55);
    min-height: 430px;
    display:flex; flex-direction:column;
  }
  .packet::before{
    content:"";
    position:absolute; inset:10px;
    border: 1.5px dashed var(--line);
    border-radius:3px;
    pointer-events:none;
  }
  .corner-seed{ position:absolute; width:16px; height:16px; opacity:0.55; }
  .corner-seed.tl{ top:4px; left:4px; }
  .corner-seed.tr{ top:4px; right:4px; transform:scaleX(-1); }
  .corner-seed.bl{ bottom:4px; left:4px; transform:scaleY(-1); }
  .corner-seed.br{ bottom:4px; right:4px; transform:scale(-1,-1); }

  .stamp{
    align-self:flex-start;
    font-family:'Space Mono', monospace; font-size:0.7rem; letter-spacing:0.08em;
    text-transform:uppercase; color: var(--soil);
    border:1.5px solid var(--soil); border-radius:3px;
    padding: 3px 9px; transform: rotate(-2deg);
    margin-bottom: 18px;
  }
  .stamp.gold{ color:var(--gold); border-color:var(--gold); }

  /* ---------- germination tracker ---------- */
  .tracker{ display:flex; gap:10px; margin-bottom: 22px; }
  .slot{
    width:44px; height:44px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background: var(--paper); border: 2px solid var(--line);
    transition: all .35s ease;
  }
  .slot svg{ width:24px; height:24px; }
  .slot.correct{ background: var(--sprout); border-color: var(--sprout-dark); }
  .slot.wrong{ background: var(--brick); border-color: #7c2c1d; }
  .slot.joker{ background: var(--gold); border-color:#93670f; }
  .slot.pending{ box-shadow: 0 0 0 3px rgba(196,136,31,0.35); }

  h2.question{
    font-family:'Fraunces', serif; font-weight:600; font-size:1.5rem;
    line-height:1.32; margin: 0 0 20px; flex-grow:0;
  }
  .qtype-label{
    font-family:'Space Mono', monospace; font-size:0.68rem; text-transform:uppercase;
    letter-spacing:0.1em; color:var(--ink-soft); margin-bottom:6px;
  }

  .options{ display:flex; flex-direction:column; gap:10px; margin-bottom:18px; }
  .opt{
    text-align:left; font-family:'Inter',sans-serif; font-size:0.98rem;
    background: var(--paper); border:1.5px solid var(--line); border-radius:5px;
    padding: 11px 14px; cursor:pointer; color: var(--ink); transition: all .15s ease;
  }
  .opt:hover{ border-color: var(--soil); transform: translateX(2px); }
  .opt.reveal-correct{ background: var(--sprout); color:#fff; border-color:var(--sprout-dark); }
  .opt.reveal-wrong{ background: var(--brick); color:#fff; border-color:#7c2c1d; }
  .opt:disabled{ cursor:default; }

  .tf-row{ display:flex; gap:12px; margin-bottom:18px; }
  .tf-row .opt{ flex:1; text-align:center; font-family:'Space Mono', monospace; font-weight:700; letter-spacing:0.06em; }

  .open-answer-box{
    background: var(--paper); border:1.5px solid var(--line); border-radius:5px;
    padding: 14px 16px; margin-bottom: 18px; font-style:italic; color: var(--ink-soft);
    display:none;
  }
  .open-answer-box.show{ display:block; }

  .judge-row{ display:flex; gap:12px; margin-top:auto; }
  .btn{
    font-family:'Space Mono', monospace; font-size:0.78rem; text-transform:uppercase;
    letter-spacing:0.08em; border:none; border-radius:4px; padding: 12px 18px;
    cursor:pointer; transition: transform .12s ease, box-shadow .12s ease;
  }
  .btn:hover{ transform: translateY(-1px); }
  .btn:active{ transform: translateY(0); }
  .btn-ghost{ background:transparent; border:1.5px solid var(--ink); color:var(--ink); }
  .btn-primary{ background: var(--ink); color: var(--paper); }
  .btn-correct{ background: var(--sprout); color:#fff; }
  .btn-wrong{ background: var(--brick); color:#fff; }
  .btn-gold{ background: var(--gold); color:#fff; }
  .btn[disabled]{ opacity:0.4; cursor:not-allowed; transform:none; }

  /* ---------- Setup screen ---------- */
  .setup{ display:flex; flex-direction:column; justify-content:center; align-items:flex-start; flex-grow:1; gap:14px; }
  .setup .lead{ font-family:'Fraunces', serif; font-size:1.6rem; font-weight:600; margin:0; }
  .setup p.sub{ color:var(--ink-soft); margin:0 0 6px; max-width:440px; }
  .name-input{
    width:100%; max-width:360px; font-family:'Inter',sans-serif; font-size:1.05rem;
    padding:12px 14px; border:1.5px solid var(--ink); border-radius:5px; background:var(--paper);
    color:var(--ink);
  }
  .name-input:focus{ outline:2px solid var(--soil); outline-offset:2px; }

  /* ---------- Result screen ---------- */
  .result{ display:flex; flex-direction:column; align-items:center; justify-content:center; flex-grow:1; text-align:center; gap:14px; }
  .result svg{ width:88px; height:88px; }
  .result h2{ font-family:'Fraunces', serif; font-size:2rem; margin:0; }
  .result p{ color:var(--ink-soft); max-width:380px; margin:0; }
  .result.pass h2{ color: var(--sprout-dark); }
  .result.fail h2{ color: var(--brick); }

  /* ---------- Sidebar ---------- */
  .side-card{
    background: var(--paper-dark); border-radius:6px; padding:20px;
    box-shadow: 0 2px 0 var(--paper-shadow);
  }
  .side-card h3{
    font-family:'Space Mono', monospace; font-size:0.72rem; text-transform:uppercase;
    letter-spacing:0.1em; color:var(--ink-soft); margin:0 0 12px;
    border-bottom:1px dashed var(--line); padding-bottom:8px;
  }
  .pool-bar{ height:8px; border-radius:4px; background: var(--paper); overflow:hidden; margin-bottom:8px; }
  .pool-fill{ height:100%; background: var(--soil); transition: width .3s ease; }
  .pool-text{ font-size:0.82rem; color:var(--ink-soft); }

  .roster{ margin-top:18px; }
  .roster-item{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    font-family:'Inter', sans-serif; font-size:0.9rem;
    padding:8px 10px; border-radius:4px; margin-bottom:6px;
    background: var(--paper);
  }
  .roster-item .badge{
    font-family:'Space Mono', monospace; font-size:0.65rem; text-transform:uppercase;
    padding:2px 7px; border-radius:3px; font-weight:700;
  }
  .roster-item.pass .badge{ background:var(--sprout); color:#fff; }
  .roster-item.fail .badge{ background:var(--brick); color:#fff; }
  .roster-empty{ color:var(--ink-soft); font-size:0.85rem; font-style:italic; }

  .reset-link{
    display:block; margin-top:18px; text-align:center; font-family:'Space Mono', monospace;
    font-size:0.7rem; text-transform:uppercase; letter-spacing:0.08em;
    color: var(--ink-soft); background:none; border:none; cursor:pointer; width:100%;
    padding:8px; border-top:1px dashed var(--line);
  }
  .reset-link:hover{ color: var(--brick); }

  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px);
    background: var(--ink); color: var(--paper); font-family:'Space Mono', monospace;
    font-size:0.78rem; padding:10px 18px; border-radius:5px; opacity:0; pointer-events:none;
    transition: all .3s ease; letter-spacing:0.04em; z-index:50;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion: reduce){
    .btn, .opt, .slot{ transition:none !important; }
  }
</style>
</head>
<body>
<div class="field">

  <header class="top">
    <div class="brand">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 44C24 44 10 34 10 20C10 12 16 6 24 6C32 6 38 12 38 20C38 34 24 44 24 44Z" stroke="#24331C" stroke-width="2"/>
        <path d="M24 44V22" stroke="#375A2E" stroke-width="2"/>
        <path d="M24 30C24 30 16 28 16 20" stroke="#4F7942" stroke-width="2"/>
        <path d="M24 26C24 26 32 24 32 16" stroke="#4F7942" stroke-width="2"/>
      </svg>
      <div>
        <h1>Semillas I</h1>
        <p>Examen en vivo · EN 040 Nivel 1</p>
      </div>
    </div>
    <div class="catalog-tag">
      Guías Mayores y Conquistadores<br>
      Instructor: <b>Douglas Hernández</b>
    </div>
  </header>

  <div class="layout">
    <main class="packet" id="stage">
      <!-- injected by JS -->
    </main>

    <aside>
      <div class="side-card">
        <h3>Banco de preguntas</h3>
        <div class="pool-bar"><div class="pool-fill" id="poolFill"></div></div>
        <div class="pool-text" id="poolText">31 / 31 disponibles</div>

        <div class="roster">
          <h3 style="margin-top:18px;">Clasificados</h3>
          <div id="rosterList"><div class="roster-empty">Aún no hay participantes.</div></div>
        </div>

        <button class="reset-link" id="resetBtn">Reiniciar juego completo</button>
      </div>
    </aside>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------------- QUESTION BANK ---------------- */
const QUESTIONS = [
  {id:1, type:'mc', q:'¿Qué se encuentra dentro de una semilla, protegido por una cubierta?', opts:['Una raíz adulta','Un embrión','Un fruto','Una flor'], correct:1},
  {id:2, type:'tf', q:'Una semilla que parece seca o sin vida ya no puede germinar nunca más.', correct:false},
  {id:3, type:'open', q:'Menciona dos condiciones que activan a una semilla para iniciar la germinación.', model:'Agua, oxígeno y temperatura apropiada (dos de estas).'},
  {id:4, type:'mc', q:'¿Cuál es el objetivo principal de una semilla?', opts:['Servir de alimento','Reproducir la planta y conservar la especie','Producir aceite','Dar color a la comida'], correct:1},
  {id:5, type:'open', q:'Según Génesis 1:29, ¿qué dio Dios al ser humano como alimento?', model:'Las plantas que producen semilla y los árboles que dan fruto con semilla.'},
  {id:6, type:'mc', q:'¿Cuáles son las tres partes básicas de una semilla?', opts:['Raíz, tallo y hoja','Tegumento, cotiledones y embrión','Flor, fruto y semilla','Pico, ala y pluma'], correct:1},
  {id:7, type:'tf', q:'El tegumento es la parte que alimenta al embrión durante la germinación.', correct:false},
  {id:8, type:'open', q:'¿Cómo se le llama a la planta pequeña en formación dentro de la semilla, de la cual saldrán la raíz, el tallo y las primeras hojas?', model:'Embrión.'},
  {id:9, type:'mc', q:'¿Cuál parte del embrión es normalmente la primera en aparecer al germinar?', opts:['Plúmula','Hipocótilo','Radícula','Cotiledón'], correct:2},
  {id:10, type:'tf', q:'El maíz es una planta dicotiledónea porque tiene dos cotiledones.', correct:false},
  {id:11, type:'mc', q:'¿Cómo se llama el método de dispersión de semillas por medio del viento?', opts:['Hidrocoria','Zoocoria','Anemocoria','Autocoria'], correct:2},
  {id:12, type:'open', q:'Da un ejemplo de una semilla que se dispersa por medio de animales (zoocoria).', model:'Guayaba, mango, mora, café o cerezas.'},
  {id:13, type:'mc', q:'¿Qué método de dispersión ocurre cuando la vaina de una planta se abre con fuerza y expulsa las semillas?', opts:['Hidrocoria','Autocoria','Anemocoria','Zoocoria'], correct:1},
  {id:14, type:'tf', q:'El coco y el mangle son ejemplos de semillas dispersadas por medio del agua (hidrocoria).', correct:true},
  {id:15, type:'mc', q:'¿A qué grupo pertenecen el frijol, la lenteja, el garbanzo y la soya?', opts:['Cereales','Legumbres','Semillas oleaginosas','Condimentos'], correct:1},
  {id:16, type:'open', q:'Menciona una semilla que se use como fuente de aceite.', model:'Girasol, soya, ajonjolí, maní, linaza, canola o algodón.'},
  {id:17, type:'tf', q:'El ajonjolí solo puede usarse como condimento y no tiene otros usos.', correct:false},
  {id:18, type:'mc', q:'¿Cuál de las siguientes semillas se usa comúnmente como condimento?', opts:['Maíz','Comino','Frijol','Girasol'], correct:1},
  {id:19, type:'open', q:'Menciona un factor necesario para que una semilla germine.', model:'Agua, oxígeno, temperatura adecuada, semilla viable, o luz/oscuridad según la especie.'},
  {id:20, type:'tf', q:'La tierra siempre es indispensable para que una semilla inicie la germinación.', correct:false},
  {id:21, type:'open', q:'Menciona 8 semillas que hayas incluido en tu muestrario de la especialidad.', model:'Respuesta abierta — verificar contra el muestrario físico del alumno.'},
  {id:22, type:'mc', q:'Además de reproducir la planta, ¿qué función de supervivencia cumplen las semillas?', opts:['Permiten que la especie continúe si la planta muere','Producen aceite','Sirven de condimento','Cambian de color'], correct:0},
  {id:23, type:'open', q:'¿Qué papel ecológico cumplen las semillas al servir de alimento a aves, insectos y mamíferos?', model:'Sostienen las cadenas alimenticias.'},
  {id:24, type:'tf', q:'El tegumento protege la semilla contra golpes, pérdida de agua, hongos e insectos.', correct:true},
  {id:25, type:'mc', q:'¿Cuál es la función de los cotiledones?', opts:['Proteger la semilla','Almacenar alimento para el embrión','Formar la raíz','Dispersar la semilla'], correct:1},
  {id:26, type:'open', q:'¿Qué parte del embrión da origen a las primeras hojas?', model:'Plúmula.'},
  {id:27, type:'mc', q:'¿Qué parte del embrión ayuda a formar el tallo inicial?', opts:['Radícula','Hipocótilo','Plúmula','Tegumento'], correct:1},
  {id:28, type:'tf', q:'La anemocoria es la dispersión de semillas por medio del agua.', correct:false},
  {id:29, type:'mc', q:'¿Cuál es el nombre técnico de la dispersión de semillas por medio de animales?', opts:['Anemocoria','Hidrocoria','Zoocoria','Autocoria'], correct:2},
  {id:30, type:'open', q:'Da un ejemplo de una semilla dispersada por anemocoria (viento).', model:'Diente de león, arce, algodón, pino o álamo.'},
  {id:31, type:'tf', q:'En la autocoria, la planta expulsa sus semillas cuando el fruto o la vaina se abre con fuerza.', correct:true},
];
const TOTAL_Q = QUESTIONS.length;

/* ---------------- STATE ---------------- */
let pool = [];               // shuffled ids remaining before reshuffle
let roster = [];             // {name, result: 'pass'|'fail'}
let session = null;          // current participant session

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function refillPool(){
  pool = shuffle(QUESTIONS.map(q=>q.id));
}
refillPool();

function drawQuestion(excludeIds){
  if(pool.length === 0){
    refillPool();
    showToast('🌱 Banco de preguntas reiniciado — empezamos de nuevo el ciclo.');
  }
  // avoid repeating a question already asked to this same participant, if possible
  let idx = pool.findIndex(id => !excludeIds.includes(id));
  if(idx === -1) idx = 0;
  const id = pool.splice(idx,1)[0];
  return QUESTIONS.find(q=>q.id===id);
}

function updatePoolUI(){
  const pct = (pool.length/TOTAL_Q)*100;
  document.getElementById('poolFill').style.width = pct+'%';
  document.getElementById('poolText').textContent = `${pool.length} / ${TOTAL_Q} disponibles`;
}

function updateRosterUI(){
  const list = document.getElementById('rosterList');
  if(roster.length===0){
    list.innerHTML = '<div class="roster-empty">Aún no hay participantes.</div>';
    return;
  }
  list.innerHTML = roster.slice().reverse().map(r=>`
    <div class="roster-item ${r.result}">
      <span>${escapeHtml(r.name)}</span>
      <span class="badge">${r.result==='pass' ? 'Clasificó' : 'Eliminado'}</span>
    </div>
  `).join('');
}

function escapeHtml(str){
  return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove('show'), 3200);
}

/* seed icon for slots */
const SEED_SVG = `<svg viewBox="0 0 24 24" fill="none"><ellipse cx="12" cy="12" rx="6" ry="9" stroke="#8a7350" stroke-width="1.6"/></svg>`;
const SPROUT_SVG = `<svg viewBox="0 0 24 24" fill="none"><path d="M12 21V11" stroke="#fff" stroke-width="2" stroke-linecap="round"/><path d="M12 15C12 15 6 14 6 8" stroke="#fff" stroke-width="2" stroke-linecap="round"/><path d="M12 12C12 12 18 11 18 5" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>`;
const WILT_SVG = `<svg viewBox="0 0 24 24" fill="none"><path d="M8 8L16 16M16 8L8 16" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>`;
const DICE_SVG = `<svg viewBox="0 0 24 24" fill="none"><rect x="5" y="5" width="14" height="14" rx="3" stroke="#fff" stroke-width="2"/><circle cx="9" cy="9" r="1.2" fill="#fff"/><circle cx="15" cy="15" r="1.2" fill="#fff"/><circle cx="15" cy="9" r="1.2" fill="#fff"/><circle cx="9" cy="15" r="1.2" fill="#fff"/></svg>`;

/* ---------------- RENDER: SETUP ---------------- */
function renderSetup(){
  session = null;
  const stage = document.getElementById('stage');
  stage.innerHTML = `
    <div class="corner-seed tl">${SEED_SVG}</div>
    <div class="corner-seed tr">${SEED_SVG}</div>
    <div class="corner-seed bl">${SEED_SVG}</div>
    <div class="corner-seed br">${SEED_SVG}</div>
    <div class="setup">
      <span class="stamp">Nuevo participante</span>
      <p class="lead">¿Quién va a sembrar hoy?</p>
      <p class="sub">Cada participante responde hasta 4 preguntas. Con 3 correctas clasifica. Si acierta 2 de las primeras 3, la cuarta es un comodín de desempate.</p>
      <input type="text" id="nameInput" class="name-input" placeholder="Nombre del participante" maxlength="40" autocomplete="off">
      <div class="judge-row" style="margin-top:8px;">
        <button class="btn btn-primary" id="startBtn">Comenzar examen</button>
      </div>
    </div>
  `;
  const input = document.getElementById('nameInput');
  const start = ()=>{
    const name = input.value.trim();
    if(!name){ input.focus(); input.style.borderColor = 'var(--brick)'; return; }
    beginSession(name);
  };
  document.getElementById('startBtn').addEventListener('click', start);
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') start(); });
  input.focus();
}

/* ---------------- SESSION LOGIC ---------------- */
function beginSession(name){
  session = {
    name,
    asked: [],       // question ids asked to this participant
    results: [],      // true/false per question answered
    roundIndex: 0,    // 0..3
    inJoker: false
  };
  askNext();
}

function askNext(){
  const q = drawQuestion(session.asked);
  session.asked.push(q.id);
  session.currentQuestion = q;
  updatePoolUI();
  renderQuestion(q);
}

function renderQuestion(q){
  const stage = document.getElementById('stage');
  const correctSoFar = session.results.filter(r=>r).length;
  const wrongSoFar = session.results.filter(r=>!r).length;
  const roundNum = session.results.length + 1;
  const isJoker = session.inJoker;

  // tracker slots (always 4 shown; grays out unused 4th unless joker reached)
  let slotsHtml = '';
  for(let i=0;i<4;i++){
    if(i < session.results.length){
      slotsHtml += `<div class="slot ${session.results[i] ? 'correct' : 'wrong'}">${session.results[i] ? SPROUT_SVG : WILT_SVG}</div>`;
    } else if(i === 3 && !isJoker && session.results.length < 3){
      slotsHtml += `<div class="slot">${SEED_SVG}</div>`;
    } else if(i === roundNum - 1){
      slotsHtml += `<div class="slot ${isJoker && i===3 ? 'joker pending' : 'pending'}">${isJoker && i===3 ? DICE_SVG : SEED_SVG}</div>`;
    } else {
      slotsHtml += `<div class="slot">${SEED_SVG}</div>`;
    }
  }

  const typeLabel = q.type==='mc' ? 'Opción múltiple' : q.type==='tf' ? 'Verdadero o falso' : 'Respuesta abierta';

  let bodyHtml = '';
  if(q.type === 'mc'){
    bodyHtml = `<div class="options">` + q.opts.map((opt,i)=>
      `<button class="opt" data-idx="${i}">${escapeHtml(opt)}</button>`
    ).join('') + `</div>
    <div class="judge-row" id="judgeRow" style="display:none;">
      <button class="btn btn-primary" id="nextBtn">Siguiente</button>
    </div>`;
  } else if(q.type === 'tf'){
    bodyHtml = `<div class="tf-row">
        <button class="opt" data-val="true">Verdadero</button>
        <button class="opt" data-val="false">Falso</button>
      </div>
      <div class="judge-row" id="judgeRow" style="display:none;">
        <button class="btn btn-primary" id="nextBtn">Siguiente</button>
      </div>`;
  } else {
    bodyHtml = `
      <button class="btn btn-ghost" id="revealBtn">Mostrar respuesta modelo</button>
      <div class="open-answer-box" id="openAnswer">${escapeHtml(q.model)}</div>
      <div class="judge-row" id="judgeRow" style="display:none; margin-top:14px;">
        <button class="btn btn-correct" id="markCorrect">Correcta ✓</button>
        <button class="btn btn-wrong" id="markWrong">Incorrecta ✗</button>
      </div>`;
  }

  stage.innerHTML = `
    <div class="corner-seed tl">${SEED_SVG}</div>
    <div class="corner-seed tr">${SEED_SVG}</div>
    <div class="corner-seed bl">${SEED_SVG}</div>
    <div class="corner-seed br">${SEED_SVG}</div>
    <span class="stamp ${isJoker?'gold':''}">${isJoker ? 'Comodín · ' + session.name : session.name + ' · Pregunta ' + roundNum + ' de 3'}</span>
    <div class="tracker">${slotsHtml}</div>
    <div class="qtype-label">${typeLabel}</div>
    <h2 class="question">${escapeHtml(q.q)}</h2>
    ${bodyHtml}
  `;

  if(q.type === 'mc'){
    const opts = stage.querySelectorAll('.opt');
    opts.forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const idx = parseInt(btn.dataset.idx,10);
        const isCorrect = idx === q.correct;
        opts.forEach((b,i)=>{
          b.disabled = true;
          if(i === q.correct) b.classList.add('reveal-correct');
          else if(i === idx && !isCorrect) b.classList.add('reveal-wrong');
        });
        document.getElementById('judgeRow').style.display = 'flex';
        document.getElementById('nextBtn').addEventListener('click', ()=>recordAnswer(isCorrect));
      });
    });
  } else if(q.type === 'tf'){
    const opts = stage.querySelectorAll('.opt');
    opts.forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const val = btn.dataset.val === 'true';
        const isCorrect = val === q.correct;
        opts.forEach(b=>{
          b.disabled = true;
          const bVal = b.dataset.val === 'true';
          if(bVal === q.correct) b.classList.add('reveal-correct');
          else if(bVal === val && !isCorrect) b.classList.add('reveal-wrong');
        });
        document.getElementById('judgeRow').style.display = 'flex';
        document.getElementById('nextBtn').addEventListener('click', ()=>recordAnswer(isCorrect));
      });
    });
  } else {
    document.getElementById('revealBtn').addEventListener('click', ()=>{
      document.getElementById('openAnswer').classList.add('show');
      document.getElementById('judgeRow').style.display = 'flex';
      document.getElementById('revealBtn').disabled = true;
    });
    document.getElementById('markCorrect').addEventListener('click', ()=>recordAnswer(true));
    document.getElementById('markWrong').addEventListener('click', ()=>recordAnswer(false));
  }
}

function recordAnswer(isCorrect){
  session.results.push(isCorrect);
  const correctCount = session.results.filter(r=>r).length;
  const wrongCount = session.results.filter(r=>!r).length;
  const answered = session.results.length;

  if(answered === 3){
    if(correctCount === 3){
      return finishSession(true);
    }
    if(wrongCount >= 2){
      return finishSession(false);
    }
    // exactly 2 correct, 1 wrong -> joker round
    session.inJoker = true;
    return askNext();
  }

  if(answered === 4){
    // joker round result decides everything
    return finishSession(correctCount >= 3);
  }

  // still within first 3
  askNext();
}

function finishSession(passed){
  roster.push({name: session.name, result: passed ? 'pass' : 'fail'});
  updateRosterUI();
  renderResult(passed, session.name);
}

function renderResult(passed, name){
  const stage = document.getElementById('stage');
  stage.innerHTML = `
    <div class="corner-seed tl">${SEED_SVG}</div>
    <div class="corner-seed tr">${SEED_SVG}</div>
    <div class="corner-seed bl">${SEED_SVG}</div>
    <div class="corner-seed br">${SEED_SVG}</div>
    <div class="result ${passed?'pass':'fail'}">
      ${passed ? `
      <svg viewBox="0 0 48 48" fill="none">
        <path d="M24 44V20" stroke="#375A2E" stroke-width="2.5"/>
        <path d="M24 26C24 26 12 24 12 12" stroke="#4F7942" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M24 20C24 20 36 18 36 6" stroke="#4F7942" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <h2>¡Germinó! 🌱</h2>
      <p><b>${escapeHtml(name)}</b> respondió correctamente y queda clasificado.</p>
      ` : `
      <svg viewBox="0 0 48 48" fill="none">
        <path d="M14 14L34 34M34 14L14 34" stroke="#A2402C" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <h2>No germinó</h2>
      <p><b>${escapeHtml(name)}</b> no logró las respuestas necesarias esta vez.</p>
      `}
      <button class="btn btn-primary" id="continueBtn" style="margin-top:8px;">Siguiente participante</button>
    </div>
  `;
  document.getElementById('continueBtn').addEventListener('click', renderSetup);
}

/* ---------------- GLOBAL RESET ---------------- */
document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(!confirm('Esto borrará la lista de clasificados y reiniciará el banco de preguntas. ¿Continuar?')) return;
  roster = [];
  refillPool();
  updatePoolUI();
  updateRosterUI();
  renderSetup();
  showToast('🔄 Juego reiniciado por completo.');
});

/* ---------------- INIT ---------------- */
updatePoolUI();
updateRosterUI();
renderSetup();
</script>
</body>
</html>
